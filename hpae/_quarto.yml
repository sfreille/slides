# ============================================
# QUARTO PROJECT CONFIGURATION
# Historia del Pensamiento y del Analisis Economico
# FCE UNC - Universidad Nacional de Cordoba
# ============================================

project:
  type: default

# Author information
author: "Sebastian Freille"
institute: "Universidad Nacional de Cordoba"

# Language settings (Spanish)
lang: es

# RevealJS format defaults
format:
  revealjs:
    # Theme
    theme: theme-hpae.scss
    
    # Self-contained output
    embed-resources: true
    
    # Slide behavior
    slide-number: true
    preview-links: auto
    center-title-slide: true
    center: false
    
    # Dimensions
    width: 1500
    height: 900
    
    # Navigation
    controls: true
    progress: true
    history: true
    
    # Table of contents
    toc: true
    toc-depth: 1
    toc-title: "Contenidos"
    
    # Captions
    tbl-cap-location: bottom
    fig-cap-location: bottom
    
    # Links
    link-external-newwindow: true
    
    # Transitions
    transition: slide
    transition-speed: default

    # Optional: Title slide background (commented - works better with highlight theme)
    title-slide-attributes:
      data-background-image: ../_shared/images/backgrounds/bg-hpae-02.png
      data-background-size: stretch
      data-background-opacity: "0.85"

# PDF output (via decktape)
  pdf:
    documentclass: scrartcl
    papersize: letter



# Execution options for code chunks
execute:
  echo: false
  warning: false
  message: false
  freeze: auto

# Bibliography (uncomment when bib file is populated)
# bibliography: ../Bibliography_base.bib
# csl: chicago-author-date.csl
