# ============================================
# HPAE - Historia del Pensamiento y Análisis Económico
# Course-level Quarto configuration
# ============================================

project:
  type: default

# Inherit shared metadata
metadata-files:
  - ../_shared/templates/_metadata.yml

# Course-specific settings
format:
  revealjs:
    # Self-contained output (no _files/ folders)
    embed-resources: true

    # Theme: Yellow highlight for dark background images
    css: ../_shared/css/theme-highlight.scss

    # Default title slide background for this course
    title-slide-attributes:
      data-background-image: ../_shared/images/backgrounds/bg-hpae-01.png
      data-background-size: stretch
      data-background-opacity: "0.85"
